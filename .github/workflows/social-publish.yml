name: Daily Social Publishing

on:
  workflow_dispatch:

jobs:
  publish:
    name: Trigger Social Agent
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Call social trigger endpoint
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SITE_URL/api/agents/social/trigger")

          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Trigger failed with status $RESPONSE"
            exit 1
          fi
