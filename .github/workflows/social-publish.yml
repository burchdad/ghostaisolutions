name: Daily Social Publishing

on:
  workflow_dispatch:

concurrency:
  group: social-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Trigger Social Agent
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10

    steps:
      - name: Call social trigger endpoint
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          RESPONSE=$(curl -sSL --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 120 -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$TARGET_URL/api/agents/social/trigger")

          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Trigger failed with status $RESPONSE"
            exit 1
          fi
