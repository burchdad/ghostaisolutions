name: Newsletter Weekly Send

on:
  workflow_dispatch:

concurrency:
  group: newsletter-weekly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    steps:
      - name: Trigger weekly newsletter digest + send
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          response=$(curl -sSL --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 120 -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$TARGET_URL/api/agents/newsletter/cron")
          echo "Response: $response"
          cat /tmp/response.json
          if [ "$response" != "200" ]; then
            echo "Newsletter send failed with status $response"
            exit 1
          fi
