name: Newsletter Weekly Send

on:
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger weekly newsletter digest + send
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          response=$(curl -sL -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$TARGET_URL/api/agents/newsletter/cron")
          echo "Response: $response"
          cat /tmp/response.json
          if [ "$response" != "200" ]; then
            echo "Newsletter send failed with status $response"
            exit 1
          fi
