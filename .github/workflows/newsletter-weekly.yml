name: Newsletter Weekly Send

on:
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger weekly newsletter digest + send
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/agents/newsletter/cron")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Newsletter send failed with status $response"
            exit 1
          fi
