name: Daily Blog Post

on:
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  schedule:
    - cron: "5 8 * * *"

concurrency:
  group: daily-blog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    name: Generate & Publish Blog Post
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The generator script uses only Node 20 built-in fetch — no npm install needed.
      # We still install deps so Next.js path aliases (@/) resolve if ever needed.
      - name: Install project dependencies
        run: npm ci

      - name: Run blog post generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENERATE_BLOG_IMAGES: ${{ secrets.GENERATE_BLOG_IMAGES || 'false' }}
        run: node scripts/generate-blog-post.mjs

      - name: Check for new post
        id: diff
        run: |
          git add content/auto-posts/
          if [ -d public/generated ] && [ "$(ls -A public/generated)" ]; then git add public/generated/; fi
          git diff --cached --exit-code && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push new post
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "Ghost AI Blog Bot"
          git config user.email "bot@ghostai.solutions"
          git commit -m "blog: auto-generate post for $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(printf '{"text":"GitHub Actions failure: %s (%s) on %s. Run: %s"}' "${{ github.workflow }}" "${{ github.job }}" "${{ github.ref_name }}" "$RUN_URL")
          curl -sS -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
