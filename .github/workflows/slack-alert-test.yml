name: Slack Alert Test

on:
  workflow_dispatch:

concurrency:
  group: slack-alert-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slack-test:
    name: Send Test Slack Alert
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5

    steps:
      - name: Intentionally fail after Slack test message
        run: |
          echo "Triggering failure notification test"
          exit 1

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(printf '{"text":"Slack alert test: %s (%s) on %s. Run: %s"}' "${{ github.workflow }}" "${{ github.job }}" "${{ github.ref_name }}" "$RUN_URL")
          curl -sS -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
