name: Trend Intelligence Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7,14 * * *"

concurrency:
  group: trend-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Fetch Trending Topics
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10

    steps:
      - name: Call trend refresh endpoint
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          RESPONSE=$(curl -sSL --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 120 -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"action":"refresh"}' \
            "$TARGET_URL/api/agents/trends/cron")

          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Trend refresh failed with status $RESPONSE"
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(printf '{"text":"GitHub Actions failure: %s (%s) on %s. Run: %s"}' "${{ github.workflow }}" "${{ github.job }}" "${{ github.ref_name }}" "$RUN_URL")
          curl -sS -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
